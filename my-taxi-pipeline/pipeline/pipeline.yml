# Zoomcamp template: pipeline.yml
# Goal: help you learn Bruin pipeline configuration patterns. This file is intentionally *not* runnable until you complete the TODOs.
#
# Key docs:
# - Pipeline files: https://getbruin.com/docs/bruin/getting-started/pipeline
# - Variables (JSON Schema): https://getbruin.com/docs/bruin/getting-started/pipeline-variables
# - Run command: https://getbruin.com/docs/bruin/commands/run

# pipeline name used for logging and environment variables
name: nyc-taxi-pipeline

# choose a reasonable schedule for ingesting monthly taxi data
schedule: monthly

# earliest date for backfills (anything prior to data availability is harmless)
start_date: "2022-01-01"

# TODO: Configure default connections so assets can omit explicit `connection: ...`.
# Common pattern: `duckdb: duckdb-default` for local dev.
# Docs (connections): https://getbruin.com/docs/bruin/commands/connections
default_connections:
  duckdb: duckdb-default

# TODO: Define pipeline variables using JSON Schema and defaults.
# - Variables must have a `default` so assets can render without `--var`.
# - In SQL/YAML assets: reference as `{{ var.my_variable }}`.
# - In Python assets: read JSON from env var `BRUIN_VARS`.
variables:
  # list of taxi categories to ingest; pipeline variable used by ingestion/trips.py
  taxi_types:
    type: array
    items:
      type: string
    default: ["yellow"]
#   other_string_var: (optional) Add your own variable and use it in both Python and SQL assets.
#     type: string
#     default: "my_value"
